<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyDirect · 로그인 (Mobile)</title>
<link rel="stylesheet" href="../shared/styles.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="../shared/data.js"></script>
<script src="../shared/plan-storage.js" defer></script>
<style>
  body { background: linear-gradient(170deg, #0052cc, #00c7ae); min-height: 100vh; color: #fff; }
  .m-auth { padding: 60px 24px 30px; display: flex; flex-direction: column; min-height: 100vh; }
  .m-auth-top { text-align: center; margin-bottom: 38px; }
  .m-auth-top .logo { color: #fff; font-size: 32px; }
  .m-auth-top .logo .dot { color: #fff; }
  .m-auth-top .badge-confirm { background: rgba(255,255,255,0.22); color: #fff; }
  .m-auth h1 { font-size: 26px; font-weight: 900; line-height: 1.25; text-align: center; margin-bottom: 10px; }
  .m-auth h1 b { color: #fff; }
  .m-auth p { font-size: 14px; opacity: 0.88; text-align: center; line-height: 1.55; margin-bottom: 50px; }

  .m-social-btn { width: 100%; padding: 16px; border-radius: 14px; font-size: 15px;
    font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 12px;
    cursor: pointer; margin-bottom: 12px; border: none; transition: 0.18s; }
  .m-social-btn:active { transform: scale(0.98); }
  .m-google { background: #fff; color: #1e293b; }
  .m-kakao { background: #FEE500; color: #181600; }
  .m-chacha { background: rgba(255,255,255,0.15); color: #fff; border: 1.5px solid rgba(255,255,255,0.4); backdrop-filter: blur(6px); }

  .m-divider { display: flex; align-items: center; gap: 14px; opacity: 0.7;
    font-size: 12px; margin: 20px 0; }
  .m-divider::before, .m-divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.3); }

  .m-features { background: rgba(255,255,255,0.12); border-radius: 18px; padding: 22px;
    backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); margin-top: 30px; }
  .m-features h4 { font-size: 13px; opacity: 0.85; margin-bottom: 12px; }
  .m-feat-row { display: flex; gap: 12px; padding: 8px 0; }
  .m-feat-row .ic { width: 32px; height: 32px; background: rgba(255,255,255,0.18); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .m-feat-row .t { font-size: 13px; font-weight: 700; }
  .m-feat-row .d { font-size: 11px; opacity: 0.78; margin-top: 2px; }

  .m-auth-notice { font-size: 11px; opacity: 0.7; text-align: center;
    line-height: 1.6; margin-top: auto; padding-top: 30px; }
</style>
</head>
<body>

<div class="m-auth">
  <div class="m-auth-top">
    <span class="logo">EasyDirect<span class="dot">.</span><span class="badge-confirm">착·착·착</span></span>
  </div>

  <h1>다이렉트 보험,<br>한 번에 시작하세요.</h1>
  <p>SNS 계정으로 5초 만에 가입하고<br>40개 상품을 비교해보세요.</p>

  <button class="m-social-btn m-google" onclick="login('google')">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    구글로 시작하기
  </button>

  <button class="m-social-btn m-kakao" onclick="login('kakao')">
    <i class="fas fa-comment" style="font-size:18px;"></i>
    카카오로 시작하기
  </button>

  <div class="m-divider">또는</div>

  <button class="m-social-btn m-chacha" onclick="login('chacha')">
    <i class="fas fa-arrow-right-arrow-left"></i>
    착·착·착 회원이신가요?
  </button>

  <div class="m-features">
    <h4>EasyDirect를 사용해야 하는 이유</h4>
    <div class="m-feat-row">
      <div class="ic"><i class="fas fa-bolt"></i></div>
      <div><div class="t">5개사 보험료 동시 조회</div><div class="d">한 번 입력으로 모든 보험사 조회</div></div>
    </div>
    <div class="m-feat-row">
      <div class="ic"><i class="fas fa-id-card"></i></div>
      <div><div class="t">실명인증 가입가능 사전 체크</div><div class="d">거절 걱정 없이 확인된 결과만</div></div>
    </div>
    <div class="m-feat-row">
      <div class="ic"><i class="fas fa-handshake"></i></div>
      <div><div class="t">다이렉트 동일 청약 절차</div><div class="d">각 보험사 정식 프로세스 그대로</div></div>
    </div>
  </div>

  <div class="m-auth-notice">
    회원가입 시 이용약관·개인정보처리방침·전자금융거래약관에<br>
    동의한 것으로 간주됩니다.
  </div>
</div>

<script>
  function login(provider) {
    window.ED.login(provider);
    const msg = provider === 'google' ? '구글 로그인 중...'
               : provider === 'kakao' ? '카카오 로그인 중...'
               : '착·착·착에서 회원정보를 불러오는 중...';
    const ov = document.createElement('div');
    ov.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,0.7);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(6px);';
    ov.innerHTML = `<div style="background:#fff;color:#1e293b;padding:30px 40px;border-radius:18px;text-align:center;min-width:260px;">
      <div class="spinner" style="width:28px;height:28px;border-width:3px;margin:0 auto 14px;"></div>
      <div style="font-weight:700;font-size:14px;">${msg}</div>
    </div>`;
    document.body.appendChild(ov);
    setTimeout(() => location.href = '01-home.html', 1400);
  }
</script>
</body>
</html>
